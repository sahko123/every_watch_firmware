# Flash layout — nRF52833 (512 KB internal flash)
# Single-slot MCUboot: no secondary slot, no swap.
#
# DFU: hold left button 3 s -> app calls sys_reboot() -> MCUboot opens
#      5-second USB DFU window -> dfu-util -d 2fe3:0100 -a 0 -D app_update.bin
#
#   0x00000 – 0x0BFFF  MCUboot (48 KB)     — bootloader + USB DFU WAIT mode
#   0x0C000 – 0x0C1FF  mcuboot_pad (512 B)  — MCUboot image header
#   0x0C200 – 0x7DFFF  app (455.5 KB)       — single firmware image slot
#   0x7E000 – 0x7FFFF  nvs_storage (8 KB)   — NVS: 2 × 4 KB sectors

mcuboot:
  address: 0x0
  end_address: 0xc000
  placement:
    before:
    - mcuboot_primary
  region: flash_primary
  size: 0xc000

mcuboot_pad:
  address: 0xc000
  end_address: 0xc200
  placement:
    align:
      start: 0x1000
    before:
    - mcuboot_primary_app
  region: flash_primary
  size: 0x200

app:
  address: 0xc200
  end_address: 0x7e000
  region: flash_primary
  size: 0x71e00

mcuboot_primary:
  address: 0xc000
  end_address: 0x7e000
  orig_span: &id001
  - mcuboot_pad
  - app
  region: flash_primary
  sharers: 0x1
  size: 0x72000
  span: *id001

mcuboot_primary_app:
  address: 0xc200
  end_address: 0x7e000
  orig_span: &id002
  - app
  region: flash_primary
  size: 0x71e00
  span: *id002

nvs_storage:
  address: 0x7e000
  end_address: 0x80000
  placement:
    align:
      start: 0x1000
    before:
    - end
  region: flash_primary
  size: 0x2000

sram_primary:
  address: 0x20000000
  end_address: 0x20020000
  region: sram_primary
  size: 0x20000
