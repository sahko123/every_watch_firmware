# MCUboot config for Every Watch — single-slot USB DFU
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SINGLE_APPLICATION_SLOT=y

# On every boot MCUboot starts USB and waits 5 seconds for dfu-util before
# booting the app. The app triggers re-entry into this window by calling
# sys_reboot() (e.g. on 3-second left-button hold). Upload tool: dfu-util.
#   dfu-util -d 2fe3:0100 -a 0 -D build/zephyr/app_update.bin
CONFIG_BOOT_USB_DFU_WAIT=y
CONFIG_BOOT_USB_DFU_WAIT_DELAY_MS=5000
