# MCUboot config for Every Watch — single-slot USB DFU with GPIO trigger
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SINGLE_APPLICATION_SLOT=y

# USB DFU class, triggered by holding left button (mcuboot-button0 alias in
# child_image/mcuboot.overlay) at boot. Upload tool: dfu-util.
#   dfu-util -d 2fe3:0100 -a 0 -D build/zephyr/app_update.bin
CONFIG_GPIO=y
CONFIG_BOOT_USB_DFU_GPIO=y
CONFIG_BOOT_USB_DFU_DETECT_DELAY=500
