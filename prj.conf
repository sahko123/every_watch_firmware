# Core
CONFIG_ARM_MPU=y
CONFIG_I2C=y
CONFIG_GPIO=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_ALARM=y

# LED matrix — WS2812B driven via 3 async SPIM DMA transfers
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y

# IMU — BMI270 accelerometer/gyroscope
CONFIG_SENSOR=y
CONFIG_BMI270=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
