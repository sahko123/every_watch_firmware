# Core
CONFIG_ARM_MPU=y
CONFIG_I2C=y
CONFIG_GPIO=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_ALARM=y

# LED matrix — WS2812B driven via 3 async SPIM DMA transfers
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y

# IMU — BMI270 accelerometer/gyroscope
CONFIG_SENSOR=y
CONFIG_BMI270=y

# BLE — peripheral (phone) + observer (encounter scanning)
# BT_CTLR is defaulted to BT in Kconfig.defconfig (Zephyr software LL,
# same as nRF52833DK — no external HCI transport needed).
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="EveryWatch"
CONFIG_BT_DEVICE_APPEARANCE=192
CONFIG_BT_MAX_CONN=2

# Power management — CPU sleeps between events; device PM for peripherals
CONFIG_PM=y
CONFIG_PM_DEVICE=y
# BQ274xx hardware PM needs int-gpios wired up; disable until that's done
CONFIG_BQ274XX_PM=n

# Identity persistence — NVS on storage_partition
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# MCUboot integration — app linked at slot0, image header added at build time
CONFIG_BOOTLOADER_MCUBOOT=y
# -Os across the whole build — saves 20-30 KB vs the default -O2
CONFIG_SIZE_OPTIMIZATIONS=y

# USB device stack + CDC-ACM virtual serial port
CONFIG_SERIAL=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# MCUmgr SMP server over USB CDC-ACM — accepts firmware uploads
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_IMG=y

# MCUmgr dependencies
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y

# Flash image manager (MCUboot slot swap support)
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# System workqueue stack must be larger for MCUmgr upload handler
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304

# Heap for MCUmgr network buffers
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Logging — ERROR level keeps flash tight while DFU stack is present.
# Raise individual modules at LOG_MODULE_REGISTER() level when debugging.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1

# Nano printf: removes float/long-long format support, saves ~2 KB.
# Safe here because we never log floats and MCUmgr uses CBOR, not printf.
CONFIG_CBPRINTF_NANO=y
