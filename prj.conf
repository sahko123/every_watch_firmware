# Core
CONFIG_ARM_MPU=y
CONFIG_I2C=y
CONFIG_GPIO=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_ALARM=y

# LED matrix — WS2812B driven via 3 async SPIM DMA transfers
CONFIG_SPI=y
CONFIG_SPI_ASYNC=y

# IMU — BMI270 accelerometer/gyroscope
CONFIG_SENSOR=y
CONFIG_BMI270=y

# BLE — peripheral (phone) + observer (encounter scanning)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="EveryWatch"
CONFIG_BT_DEVICE_APPEARANCE=192
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
# Bond key persistence — without BT_SETTINGS bonds are RAM-only and lost on reboot
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Power management — CPU sleeps between events; device PM for peripherals
CONFIG_PM=y
CONFIG_PM_DEVICE=y
# BQ274xx hardware PM needs int-gpios wired up; disable until that's done
CONFIG_BQ274XX_PM=n

# Identity persistence — NVS on storage_partition
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# MCUboot integration — app linked at slot0, image header/hash added at build time.
# Firmware updates: hold left button 3 s -> app calls sys_reboot() -> MCUboot
# opens USB DFU window (5 s) -> dfu-util flashes new image. Works whether the
# watch is on battery or USB power because the window opens after every reboot.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_REBOOT=y

# -Os across the whole build — saves 20-30 KB vs the default -O2
CONFIG_SIZE_OPTIMIZATIONS=y

# Nano printf: drops float/long-long format support, saves ~1 KB.
# Safe: we log at ERROR level only and never format floats.
CONFIG_CBPRINTF_NANO=y

# Logging — ERROR level only to keep flash usage down.
# Raise individual modules at LOG_MODULE_REGISTER() level when debugging.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
